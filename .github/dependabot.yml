version: 2
updates:
  # npm dependencies across the pnpm workspace.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # @prisma-next/* pins are exact by design and upgraded deliberately.
      # See docs/prisma-next/versioning-and-compatibility.md.
      - dependency-name: "@prisma-next/*"

  # GitHub Actions used in CI / release / deploy workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
